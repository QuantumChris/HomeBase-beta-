<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chat Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        #wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        iframe {
            border: none;
            height: 100%;
            /* Make iframe wider than viewport to fit sidebar + chat */
            width: calc(100% + 200px);
            /* Shift left to hide the sidebar */
            margin-left: -200px;
            transition: margin-left 0.3s ease;
        }
        iframe.sidebar-open {
            margin-left: 0;
            width: 100%;
        }
        #toggle-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.8;
        }
        #toggle-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <button id="toggle-btn">☰ Menu</button>
        <iframe
            id="chat-frame"
            src="https://app.vectorshift.ai/chatbots/deployed/69fa933c643eab81063f8418"
            allow="clipboard-read; clipboard-write; microphone">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('chat-frame');
        const btn = document.getElementById('toggle-btn');
        let sidebarOpen = false;

        btn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                iframe.classList.add('sidebar-open');
                btn.textContent = '✕ Close';
            } else {
                iframe.classList.remove('sidebar-open');
                btn.textContent = '☰ Menu';
            }
        });
    </script>
</body>
</html>
