<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chat Assistant</title>
    <link rel="preconnect" href="https://app.vectorshift.ai">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        #wrapper {
            width: calc(100% + 205px);
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        iframe {
            border: none;
            height: 100%;
            width: 100%;
            position: absolute;
            left: 0;
            transform: translateX(-205px);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }
        iframe.loaded {
            opacity: 1;
        }
        iframe.sidebar-open {
            transform: translateX(0);
        }
        #toggle-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #toggle-btn.loaded {
            opacity: 0.8;
        }
        #toggle-btn:hover {
            opacity: 1;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 9998;
            transition: opacity 0.4s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            color: #666;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading chat...</p>
    </div>

    <div id="wrapper">
        <button id="toggle-btn">☰ Menu</button>
        <iframe
            id="chat-frame"
            src="https://app.vectorshift.ai/chatbots/deployed/69fa933c643eab81063f8418"
            allow="clipboard-read; clipboard-write; microphone">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('chat-frame');
        const btn = document.getElementById('toggle-btn');
        const loading = document.getElementById('loading');
        let sidebarOpen = false;

        iframe.addEventListener('load', function() {
            loading.classList.add('hidden');
            iframe.classList.add('loaded');
            btn.classList.add('loaded');
        });

        btn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                iframe.classList.add('sidebar-open');
                btn.textContent = '✕ Close';
            } else {
                iframe.classList.remove('sidebar-open');
                btn.textContent = '☰ Menu';
            }
        });
    </script>
</body>
</html>
